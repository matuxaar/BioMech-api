version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desertacia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./migrations/002_actions.sql:/docker-entrypoint-initdb.d/002_actions.sql
      - ./migrations/003_nickname.sql:/docker-entrypoint-initdb.d/003_nickname.sql
      - ./migrations/004_training_files.sql:/docker-entrypoint-initdb.d/004_training_files.sql
      - ./migrations/005_ble_actions.sql:/docker-entrypoint-initdb.d/005_ble_actions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/desertacia?sslmode=disable"
      ML_SERVICE_URL: "http://ml:8000"
      DEV_MODE: "true"
      MIGRATIONS_DIR: "/migrations"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
