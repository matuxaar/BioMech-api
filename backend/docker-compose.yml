services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: desertacia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml:
    build: ../ml
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/desertacia"
      MODELS_DIR: "/app/models"
    volumes:
      - ml_models:/app/models
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      DATABASE_URL: "postgres://postgres:postgres@db:5432/desertacia?sslmode=disable"
      ML_SERVICE_URL: "http://ml:8000"
      INTERNAL_API_KEY: "dev-key"
      DEV_MODE: "true"
      MIGRATIONS_DIR: "/migrations"
      UPLOADS_DIR: "/uploads"
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  ml_models:
  uploads:
