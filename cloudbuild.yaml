steps:
  - name: 'golang:1.25-alpine'
    entrypoint: 'go'
    args:
      - 'vet'
      - './...'
    dir: 'backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'biomech-api'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/api'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloud-sql-instances=${_CLOUD_SQL_INSTANCE}'
      - '--set-env-vars=DATABASE_URL=postgres://${_DB_USER}:${_DB_PASS}@localhost:5432/${_DB_NAME}?sslmode=disable'
      - '--set-env-vars=SERVER_PORT=8080'
      - '--set-env-vars=ML_SERVICE_URL=https://${_ML_SERVICE_URL}'
      - '--set-env-vars=FIREBASE_CREDENTIALS=/secrets/firebase-service-account.json'
      - '--set-secrets=/secrets/firebase-service-account.json=firebase-service-account:latest'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml'
      - '-f'
      - 'ml/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'biomech-ml'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ml'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloud-sql-instances=${_CLOUD_SQL_INSTANCE}'
      - '--set-env-vars=DATABASE_URL=postgresql://${_DB_USER}:${_DB_PASS}@localhost:5432/${_DB_NAME}'
      - '--set-env-vars=GCS_BUCKET=$PROJECT_ID'
      - '--set-env-vars=MODELS_DIR=/tmp/models'
      - '--set-env-vars=BACKEND_CALLBACK_URL=https://${_API_SERVICE_URL}/api/v1/training/jobs'
      - '--set-env-vars=BACKEND_API_KEY=${_INTERNAL_API_KEY}'
      - '--memory=4Gi'
      - '--cpu=2'

substitutions:
  _REGION: us-central1
  _CLOUD_SQL_INSTANCE: biomech-217fe:us-central1:biomech-db
  _DB_USER: postgres
  _DB_PASS: postgres
  _DB_NAME: desertacia
  # Replace abcdef with actual Cloud Run URL hash before deploying
  _ML_SERVICE_URL: biomech-ml-abcdef-uc.a.run.app
  _API_SERVICE_URL: biomech-api-abcdef-uc.a.run.app
  _INTERNAL_API_KEY: change-me-in-production

options:
  logging: CLOUD_LOGGING_ONLY
