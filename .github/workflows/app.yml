name: App CI

on:
  push:
    branches: [main]
    paths:
      - "BioMech-app/**"
  pull_request:
    branches: [main]
    paths:
      - "BioMech-app/**"

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BioMech-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build Android
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: BioMech-app/androidApp/build/outputs/apk/debug/*.apk
