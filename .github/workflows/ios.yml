name: iOS

on:
  push:
    branches: [main]
    paths:
      - "BioMech-app/**"
  pull_request:
    branches: [main]
    paths:
      - "BioMech-app/**"

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx6g

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: BioMech-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Set up Kotlin
        run: |
          curl -sSL "https://github.com/JetBrains/kotlin/releases/download/v2.1.0/kotlin-compiler-2.1.0.zip" -o kotlin.zip
          unzip -q kotlin.zip -d /tmp/kotlin
          echo "/tmp/kotlin/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            BioMech-app/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('BioMech-app/**/*.gradle.kts', 'BioMech-app/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Compile iOS shared module
        run: ./gradlew :shared:compileKotlinIosArm64 :shared:compileKotlinIosSimulatorArm64

      - name: Compile iOS app (simulator)
        run: ./gradlew :iosApp:compileKotlinIosSimulatorArm64

      - name: Run shared tests
        run: ./gradlew :shared:allTests
